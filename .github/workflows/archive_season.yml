name: 시즌 종료 자동 아카이브

on:
  schedule:
    # 매년 1월 1일 00:00 KST (= UTC 15:00, 12월 31일)
    - cron: '0 15 31 12 *'
  workflow_dispatch:   # 수동 실행 버튼 (테스트용)

jobs:
  archive:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 의존성 설치
        run: npm install firebase-admin
        working-directory: functions

      - name: 시즌 아카이브 실행
        env:
          FIREBASE_CREDENTIALS: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        run: node archive_season.js
        working-directory: functions
